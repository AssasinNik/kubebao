{{- if .Values.ui.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.ui.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubebao.ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubebao.ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubebao.ui.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kubebao.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.ui.securityContext | nindent 8 }}
      containers:
        - name: ui
          image: {{ include "kubebao.image" (dict "root" . "image" .Values.ui.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          env:
            - name: KUBEBAO_UI_LISTEN
              value: ":{{ .Values.ui.service.port }}"
            - name: OPENBAO_ADDR
              value: {{ .Values.global.openbao.address | quote }}
            - name: KUBEBAO_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            {{- if .Values.kms.enabled }}
            - name: KUBEBAO_KMS_KEY_NAME
              value: {{ .Values.kms.keyName | quote }}
            - name: KUBEBAO_KMS_KV_PREFIX
              value: {{ .Values.kms.kuznyechik.kvPathPrefix | quote }}
            {{- end }}
            {{- with .Values.ui.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.ui.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.ui.containerSecurityContext | nindent 12 }}
      {{- with .Values.ui.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
