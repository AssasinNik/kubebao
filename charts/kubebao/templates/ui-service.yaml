{{- if .Values.ui.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.ui.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubebao.ui.labels" . | nindent 4 }}
spec:
  type: {{ .Values.ui.service.type }}
  ports:
    - port: {{ .Values.ui.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "kubebao.ui.selectorLabels" . | nindent 4 }}
{{- end }}
