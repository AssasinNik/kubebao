# KubeBao Helm Chart Values

# Global settings
global:
  # OpenBao connection settings
  openbao:
    # Address of the OpenBao server (REQUIRED)
    # Example: "http://openbao.openbao.svc.cluster.local:8200"
    address: "http://openbao.openbao.svc.cluster.local:8200"
    # Authentication method (kubernetes, token)
    authMethod: kubernetes
    # Role for Kubernetes authentication
    role: kubebao
    # Namespace in OpenBao (enterprise feature)
    namespace: ""
    # TLS configuration
    tls:
      enabled: false
      # CA certificate (can be a secret reference)
      caCert: ""
      # Skip TLS verification (not recommended for production)
      insecure: false
  
  # Image settings
  image:
    # Container registry (e.g., ghcr.io/your-username)
    registry: ghcr.io/assasinnik
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion
    tag: ""
  
  # Image pull secrets (for private registries)
  imagePullSecrets: []
  # - name: ghcr-secret

# KMS Plugin settings
kms:
  enabled: true
  
  # Name of the KMS deployment
  name: kubebao-kms
  
  # Number of replicas (typically 1 per control plane node)
  replicaCount: 1
  
  image:
    repository: kubebao-kms
    # tag: "" # Defaults to appVersion
  
  # Socket path for KMS plugin
  socketPath: /var/run/kubebao/kms.sock
  
  # Encryption provider: "kuznyechik" (ГОСТ Р 34.12-2015, recommended) or "transit" (OpenBao Transit)
  encryptionProvider: kuznyechik
  
  # Key configuration
  keyName: kubebao-kms
  
  # Kuznyechik configuration (ГОСТ Р 34.12-2015 + ГОСТ Р 34.13-2015 CTR/CMAC)
  kuznyechik:
    # Path prefix for keys in OpenBao KV (secret/data/{kvPathPrefix}/{keyName})
    kvPathPrefix: kubebao/kms-keys
    createKeyIfNotExists: true
  
  # Transit key configuration (legacy, not recommended for production)
  transit:
    keyName: kubebao-kms
    keyType: aes256-gcm96
    mountPath: transit
    createKeyIfNotExists: true
  
  # Health check interval for key availability verification
  healthCheckInterval: 30s

  # Resources (production-grade)
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  # Node selector
  nodeSelector: {}
  
  # Tolerations for control plane nodes
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
  
  # Pod security context
  securityContext:
    fsGroup: 10123
    seccompProfile:
      type: RuntimeDefault
  
  # Container security context (hardened)
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 10123
    runAsGroup: 10123
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

# CSI Provider settings
csi:
  enabled: true
  
  # Name of the CSI provider deployment
  name: kubebao-csi
  
  image:
    repository: kubebao-csi
    # tag: "" # Defaults to appVersion
  
  # Socket path for CSI provider
  socketPath: /provider/kubebao.sock
  
  # Install secrets-store-csi-driver as dependency
  driver:
    install: false
  
  # Cache TTL for secrets
  cacheTTL: 5m
  
  # Enable secret rotation
  enableSecretRotation: true
  rotationPollInterval: 2m
  
  # Resources
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  
  # Node selector
  nodeSelector: {}
  
  # Tolerations
  tolerations: []
  
  # Pod security context
  securityContext:
    fsGroup: 10123
    seccompProfile:
      type: RuntimeDefault
  
  # Container security context (hardened)
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 10123
    runAsGroup: 10123
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

# Operator settings
operator:
  enabled: true
  
  # CRD installation
  crds:
    # Install CRDs with the chart
    install: true
  
  # Name of the operator deployment
  name: kubebao-operator
  
  # Number of replicas
  replicaCount: 1
  
  image:
    repository: kubebao-operator
    # tag: "" # Defaults to appVersion
  
  # Leader election settings
  leaderElection:
    enabled: true
    namespace: ""  # Defaults to release namespace
  
  # Metrics configuration
  metrics:
    enabled: true
    port: 8080
  
  # Health probe configuration
  healthProbe:
    port: 8081
  
  # Resources
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  # Node selector
  nodeSelector: {}
  
  # Tolerations
  tolerations: []
  
  # Pod security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 10123
    runAsGroup: 10123
    fsGroup: 10123
    seccompProfile:
      type: RuntimeDefault
  
  # Container security context (hardened)
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

# UI Dashboard settings
ui:
  enabled: true

  name: kubebao-ui

  replicaCount: 1

  image:
    repository: kubebao-ui

  # Service configuration
  service:
    type: ClusterIP
    port: 8443

  # Ingress configuration
  ingress:
    enabled: true
    className: nginx
    annotations: {}
    hosts:
      - host: kubebao.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  # Resources
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

  # Node selector
  nodeSelector: {}

  # Tolerations
  tolerations: []

  # Pod security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 10123
    runAsGroup: 10123
    fsGroup: 10123
    seccompProfile:
      type: RuntimeDefault

  # Container security context
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

# Service account settings
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use
  name: kubebao
  # Annotations to add to the service account
  annotations: {}

# RBAC settings
rbac:
  # Specifies whether RBAC resources should be created
  create: true

# Extra environment variables for all components
extraEnv: []

# Extra volumes for all components
extraVolumes: []

# Extra volume mounts for all components
extraVolumeMounts: []

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}
