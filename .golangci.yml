version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: zz_generated
        linters:
          - ALL
      - path: proto/
        linters:
          - ALL
