# KubeBao Dynamic Secrets Demo
#
# Демонстрирует:
#   1. CSI: монтирование секретов из OpenBao в файлы пода
#   2. BaoSecret (Operator): автоматическая синхронизация секретов из OpenBao в Kubernetes Secret
#
# Предварительные требования:
#   - OpenBao запущен и доступен (kubectl port-forward -n openbao svc/openbao 8200:8200)
#   - Kubernetes Auth настроен в OpenBao (см. DEPLOYMENT.md, раздел 10.1)
#   - ServiceAccount "my-app" имеет роль в OpenBao
#   - Секреты myapp/database и myapp/config существуют в OpenBao KV:
#
#     export BAO_ADDR=http://127.0.0.1:8200
#     export BAO_TOKEN=<root token>
#     bao kv put secret/myapp/database username=dbuser password=SuperSecret123! host=db.example.com port=5432
#     bao kv put secret/myapp/config api_key=sk-test-key-abc123 environment=production debug=false
#
#   - CSIDriver secrets-store.csi.k8s.io имеет tokenRequests:
#     kubectl patch csidriver secrets-store.csi.k8s.io --type='json' \
#       -p='[{"op":"add","path":"/spec/tokenRequests","value":[{"audience":"","expirationSeconds":3600}]}]'

---
# ServiceAccount для приложения (должен совпадать с bound_service_account_names в роли OpenBao)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-app
  namespace: default

---
# SecretProviderClass — какие секреты из OpenBao монтировать в файлы
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: kubebao-demo-secrets
  namespace: default
spec:
  provider: kubebao
  parameters:
    roleName: "my-app"
    objects: |
      - objectName: "db-password"
        secretPath: "myapp/database"
        secretKey: "password"
      - objectName: "db-username"
        secretPath: "myapp/database"
        secretKey: "username"
      - objectName: "db-host"
        secretPath: "myapp/database"
        secretKey: "host"
  # Синхронизация CSI-файлов в Kubernetes Secret (для использования как env vars)
  secretObjects:
    - secretName: demo-synced-secret
      type: Opaque
      data:
        - objectName: db-password
          key: password
        - objectName: db-username
          key: username

---
# Deployment: под читает секреты из смонтированного CSI-тома
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: default
  labels:
    app: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      serviceAccountName: demo-app
      containers:
        - name: app
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "=== KubeBao Dynamic Secrets Demo ==="
              echo "Secrets are mounted at /mnt/secrets"
              echo ""
              while true; do
                echo "--- $(date) ---"
                echo "Database Password: $(cat /mnt/secrets/db-password)"
                echo "Database Username: $(cat /mnt/secrets/db-username)"
                echo "Database Host: $(cat /mnt/secrets/db-host)"
                echo ""
                echo "To update secrets in OpenBao:"
                echo "  bao kv put secret/myapp/database username=newuser password=newpass host=newhost port=5432"
                echo "Then restart: kubectl rollout restart deployment/demo-app"
                echo ""
                sleep 30
              done
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets"
              readOnly: true
          resources:
            limits:
              memory: "64Mi"
              cpu: "100m"
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "kubebao-demo-secrets"

---
# BaoSecret (Operator) — автосинхронизация myapp/config в Kubernetes Secret
# Обновляется каждые 30 секунд
apiVersion: kubebao.io/v1alpha1
kind: BaoSecret
metadata:
  name: demo-operator-secret
  namespace: default
spec:
  secretPath: "myapp/config"
  target:
    name: demo-operator-synced
    labels:
      app: demo
      managed-by: kubebao
  refreshInterval: "30s"
