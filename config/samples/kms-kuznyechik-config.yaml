# KMS configuration — Кузнечик (ГОСТ Р 34.12-2015 + ГОСТ Р 34.13-2015)
#
# Шифрование: Кузнечик-CTR (ГОСТ Р 34.13-2015)
# Аутентификация: CMAC на базе Кузнечика (ГОСТ Р 34.13-2015)
# Ключи хранятся в OpenBao KV, шифрование выполняется локально.
#
# Usage:
#   kubebao-kms --config kms-kuznyechik-config.yaml

socketPath: /var/run/kubebao/kms.sock
keyName: kubebao-kms
keyType: kuznyechik
encryptionProvider: kuznyechik
kvPathPrefix: kubebao/kms-keys
createKeyIfNotExists: true
healthCheckInterval: 30s

openbao:
  address: "http://openbao.openbao.svc.cluster.local:8200"
  # Kubernetes auth (recommended for production)
  kubernetesAuth:
    role: kubebao
    mountPath: kubernetes
    tokenPath: /var/run/secrets/kubernetes.io/serviceaccount/token
  # TLS (обязательно для production)
  # tls:
  #   caCert: /etc/kubebao/ca.crt
  #   insecure: false
  maxRetries: 3
  timeout: 30s
